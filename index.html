<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SATI | MODO DE CRIAÇÃO</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 10px; display: flex; flex-direction: column; height: 100vh; }
        .logo-sati { background: #00ff95; color: #000; padding: 8px; border-radius: 5px; font-weight: bold; display: inline-block; margin-bottom: 10px; }
        #chat { flex: 1; background: #08080a; border: 1px solid #1a1a1e; border-radius: 10px; padding: 15px; overflow-y: auto; font-size: 13px; margin-bottom: 10px; }
        textarea { width: 100%; height: 150px; background: #000; color: #00ff95; border: 1px solid #222; border-radius: 8px; padding: 10px; font-family: monospace; font-size: 11px; margin-bottom: 10px; }
        .input-area { display: flex; gap: 5px; margin-bottom: 10px; }
        input { flex: 1; background: #111; border: 1px solid #222; color: #fff; padding: 12px; border-radius: 8px; outline: none; }
        button { background: #00ff95; color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-apk { width: 100%; padding: 18px; background: #111; color: #00ff95; border: 1px solid #00ff95; border-radius: 10px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="logo-sati">SATI HUB V12</div>

<div id="chat">
    <div style="color: #4b85ff;"><strong>SATI:</strong> Conectado! Escreva abaixo o que o seu App deve fazer.</div>
</div>

<textarea id="editor" readonly>// O código do seu App aparecerá aqui...</textarea>

<div class="input-area">
    <input type="text" id="pedido" placeholder="Ex: App de música...">
    <button onclick="gerar()">GERAR</button>
</div>

<button class="btn-apk" onclick="alert('SISTEMA LIBERADO: Compilando seu App personalizado...')">INSTALAR APK NO CELULAR</button>

<script>
    function gerar() {
        const txt = document.getElementById('pedido').value;
        if(!txt) return;
        document.getElementById('chat').innerHTML += `<div style="margin-top:10px; text-align:right;">${txt}</div>`;
        document.getElementById('chat').innerHTML += `<div style="margin-top:10px; color:#4b85ff;"><strong>SATI:</strong> Criando código para "${txt}"...</div>`;
        document.getElementById('editor').value = "// CÓDIGO SATI\nimport 'package:flutter/material.dart';\n\nvoid main() => runApp(MaterialApp(home: Text('" + txt + " Ativo!')));";
        document.getElementById('pedido').value = "";
    }
</script>
</body>
</html>
